name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy promptune/

      - name: Tests with coverage
        run: pytest --cov=promptune --cov-report=term-missing --cov-fail-under=89

  build:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    # Gated: only cut a GitHub Release when publishing is enabled, so a stray
    # tag can't create a release pointing at a version that isn't on PyPI.
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  # PyPI publish via OIDC trusted publishing (no API token stored).
  # GATED OFF: this job is SKIPPED unless the repo variable PUBLISH_TO_PYPI == 'true'
  #   (Settings -> Secrets and variables -> Actions -> Variables -> New variable).
  # Before enabling, do the one-time PyPI setup: add a pending publisher at
  # pypi.org -> Publishing  (owner=kayumuzzaman, repo=promptune,
  # workflow=release.yml, environment=pypi).
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
