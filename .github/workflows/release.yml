name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy promptune/

      - name: Tests with coverage
        run: pytest -m "not linux" --cov=promptune --cov-report=term-missing --cov-config=.coveragerc-linux --cov-fail-under=85

  build:
    needs: [validate, linux-integration]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Wheel install smoke
        run: |
          python -m venv .dist-smoke
          .dist-smoke/bin/python -m pip install dist/*.whl
          .dist-smoke/bin/promptune --version
          .dist-smoke/bin/python -m promptune --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # PyPI publish via OIDC trusted publishing (no API token stored).
  # GATED OFF: this job is SKIPPED unless the repo variable PUBLISH_TO_PYPI == 'true'
  #   (Settings -> Secrets and variables -> Actions -> Variables -> New variable).
  # Before enabling, do the one-time PyPI setup: add a pending publisher at
  # pypi.org -> Publishing  (owner=kayumuzzaman, repo=promptune,
  # workflow=release.yml, environment=pypi).
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_TO_PYPI == 'true' }}
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: publish
    runs-on: ubuntu-latest
    # Gated: only cut a GitHub Release after PyPI publish succeeds, so a stray
    # manual branch dispatch cannot publish artifacts or create a release.
    if: ${{ startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_TO_PYPI == 'true' }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  linux-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xclip xdotool wl-clipboard libxkbcommon0

      - name: Install package (with Linux daemon extras)
        run: pip install -e ".[dev,linux-daemon]"

      - name: X11 integration tests (Xvfb)
        run: xvfb-run -a pytest -m x11 -p no:cacheprovider
